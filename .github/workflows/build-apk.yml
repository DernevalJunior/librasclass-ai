name: Build APK (LibrasClass AI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: List repo folders (debug)
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== FIND app_flutter ==="
          find . -maxdepth 5 -type d -name "app_flutter" -print

      - name: Find Flutter project folder (pubspec.yaml)
        id: find
        run: |
          set -e
          FILE=$(find . -maxdepth 6 -name pubspec.yaml -print | head -n 1)
          echo "Found pubspec: $FILE"
          DIR=$(dirname "$FILE")
          echo "flutter_dir=$DIR" >> $GITHUB_OUTPUT

      - name: Flutter pub get
        working-directory: ${{ steps.find.outputs.flutter_dir }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ steps.find.outputs.flutter_dir }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.find.outputs.flutter_dir }}/build/app/outputs/flutter-apk/app-release.apk
