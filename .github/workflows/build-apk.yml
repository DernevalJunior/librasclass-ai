name: Build APK (LibrasClass AI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Debug repo tree
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== app_flutter dirs ==="
          find . -maxdepth 10 -type d -name "app_flutter" -print
          echo "=== pubspecs inside app_flutter ==="
          find . -maxdepth 10 -path "*/app_flutter/pubspec.yaml" -print

      - name: Find correct Flutter app folder (app_flutter)
        id: find
        run: |
          set -e
          PUBSPEC=$(find . -maxdepth 10 -path "*/app_flutter/pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC" ]; then
            echo "Erro: não encontrei */app_flutter/pubspec.yaml"
            exit 1
          fi

          APP_DIR=$(dirname "$PUBSPEC")
          echo "Found app
