name: Build APK (LibrasClass AI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project (ZIP enviado no repositório)
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 3 -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "Erro: nenhum arquivo .zip encontrado no repositório"
            exit 1
          fi

          echo "ZIP encontrado: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted_project

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Find Flutter source folder (lib/main.dart)
        id: find
        run: |
          set -e
          MAIN=$(find extracted_project -maxdepth 12 -path "*/lib/main.dart" | head -n 1)

          if [ -z "$MAIN" ]; then
            echo "Erro: não encontrei lib/main.dart dentro do zip extraído"
            exit 1
          fi

          SRC_DIR=$(dirname "$(dirname "$MAIN")")

          if [ ! -f "$SRC_DIR/pubspec.yaml" ]; then
            echo "Erro: pubspec.yaml não encontrado em $SRC_DIR"
            exit 1
          fi

          echo "src_dir=$SRC_DIR" >> $GITHUB_OUTPUT
          echo "SRC_DIR=$SRC_DIR"

      - name: Create fresh Flutter project (fix Gradle structure)
        run: |
          flutter create -t app build_app

      - name: Overlay source files into fresh project
        run: |
          set -e
          SRC="${{ steps.find.outputs.src_dir }}"

          # substituir código Dart
          rm -rf build_app/lib
          cp -r "$SRC/lib" build_app/

          # copiar assets (se existir)
          if [ -d "$SRC/assets" ]; then
            rm -rf build_app/assets
            cp -r "$SRC/assets" build_app/
          fi

          # substituir pubspec
          cp "$SRC/pubspec.yaml" build_app/pubspec.yaml

          echo "=== Conteúdo final build_app ==="
          ls -la build_app
          ls -la build_app/lib

      - name: Flutter pub get
        working-directory: build_app
        run: flutter pub get

      - name: Build release APK
        working-directory: build_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build_app/build/app/outputs/flutter-apk/app-release.apk
