name: Build APK (LibrasClass AI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Debug repo tree
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== pubspecs ==="
          find . -maxdepth 8 -name pubspec.yaml -print

      - name: Find correct Flutter app folder
        id: find
        run: |
          set -e
          APP_DIR=$(find . -maxdepth 8 -name pubspec.yaml -exec grep -l "name: librasclass_ai" {} \; | head -n 1 | xargs dirname)
          echo "Found app dir: $APP_DIR"

          if [ -z "$APP_DIR" ]; then
            echo "Erro: não encontrei pubspec.yaml do app librasclass_ai"
            exit 1
          fi

          if [ ! -f "$APP_DIR/lib/main.dart" ]; then
            echo "Erro: pasta encontrada não contém lib/main.dart -> $APP_DIR"
            exit 1
          fi

          echo "flutter_dir=$APP_DIR" >> $GITHUB_OUTPUT

      - name: Flutter pub get
        working-directory: ${{ steps.find.outputs.flutter_dir }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ steps.find.outputs.flutter_dir }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.find.outputs.flutter_dir }}/build/app/outputs/flutter-apk/app-release.apk
